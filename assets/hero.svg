<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Foyer</title>
  <desc id="hero-desc">Glance, don't drown. A calm, phone-first triage surface. Messages drift in from the right, pass through a threshold, and settle quietly into urgency lanes.</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0f13"/>
      <stop offset="100%" stop-color="#14161a"/>
    </linearGradient>

    <!-- Brand gradient: peach to blue to slate (Foyer's muted accents) -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8a48f"/>
      <stop offset="55%" stop-color="#9bb4d8"/>
      <stop offset="100%" stop-color="#7e8796"/>
    </linearGradient>

    <!-- Soft glow -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>

  <!-- Ambient glow, very soft -->
  <g opacity="0.07">
    <circle cx="260" cy="250" r="170" fill="#9bb4d8"/>
    <circle cx="1040" cy="70" r="150" fill="#d8a48f"/>
    <circle cx="640" cy="170" r="150" fill="#7e8796"/>
  </g>

  <!-- The threshold: a quiet doorway the items pass through into the foyer -->
  <g stroke="#9bb4d8" stroke-width="1.5" fill="none" opacity="0.35" filter="url(#glow)">
    <path d="M548 250 L548 138 Q548 96 590 96 L606 96 Q648 96 648 138 L648 250"/>
  </g>
  <!-- Threshold sill: a calm pulse when everything is caught up -->
  <line x1="540" y1="250" x2="656" y2="250" stroke="#9bb4d8" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.25;0.6;0.25" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- Four urgency lanes (right of the threshold), faint -->
  <g stroke-width="1" opacity="0.18">
    <line x1="664" y1="120" x2="1130" y2="120" stroke="#d8a48f"/>
    <line x1="664" y1="158" x2="1130" y2="158" stroke="#9bb4d8"/>
    <line x1="664" y1="194" x2="1130" y2="194" stroke="#7e8796"/>
    <line x1="664" y1="228" x2="1130" y2="228" stroke="#4b525e"/>
  </g>

  <!-- Lane labels -->
  <g font-family="'Inter', system-ui, sans-serif" font-size="11" text-anchor="end" opacity="0.65">
    <text x="1130" y="112" fill="#d8a48f">waiting on you</text>
    <text x="1130" y="150" fill="#9bb4d8">worth a look</text>
    <text x="1130" y="186" fill="#7e8796">can wait</text>
    <text x="1130" y="220" fill="#4b525e">noise</text>
  </g>

  <!-- Settled, calm nodes just inside the threshold (where items come to rest) -->
  <g filter="url(#glow)">
    <circle cx="688" cy="120" r="5" fill="#d8a48f" opacity="0.9">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="688" cy="158" r="4.5" fill="#9bb4d8" opacity="0.8">
      <animate attributeName="opacity" values="0.45;0.8;0.45" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="688" cy="194" r="3.5" fill="#7e8796" opacity="0.6"/>
    <circle cx="688" cy="228" r="3" fill="#4b525e" opacity="0.5"/>
  </g>

  <!-- Incoming items: drift slowly leftward along a lane, then fade as they settle.
       Deliberately calm — long, gentle durations, low opacity. -->
  <g>
    <circle r="3.5" cy="120" fill="#d8a48f">
      <animate attributeName="cx" values="1130;688" dur="9s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.15;0.8;1" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle r="3" cy="158" fill="#9bb4d8">
      <animate attributeName="cx" values="1130;688" dur="7.5s" begin="1.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="0;0.75;0.75;0" keyTimes="0;0.15;0.8;1" dur="7.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle r="2.5" cy="194" fill="#7e8796">
      <animate attributeName="cx" values="1130;688" dur="11s" begin="3s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.15;0.8;1" dur="11s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle r="2.5" cy="228" fill="#4b525e">
      <animate attributeName="cx" values="1130;688" dur="13s" begin="2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.15;0.8;1" dur="13s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Title -->
  <text x="80" y="124" font-size="46" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-weight="700" letter-spacing="-0.02em" fill="url(#brand)" filter="url(#text-glow)">Foyer</text>

  <!-- Tagline -->
  <text x="82" y="156" fill="#c2cad6" font-size="17" font-family="'Inter', system-ui, sans-serif">Glance, don't drown.</text>
  <text x="82" y="182" fill="#7e8796" font-size="14" font-family="'Inter', system-ui, sans-serif">SMS · RCS · email · notifications — one calm, pre-triaged view.</text>

  <!-- The Sill badge: ambient mood, never a count -->
  <g transform="translate(80, 214)">
    <rect width="232" height="40" rx="12" fill="#1b1e24" stroke="#2e3540" stroke-width="1"/>
    <circle cx="22" cy="20" r="4" fill="#9bb4d8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="6s" repeatCount="indefinite"/>
    </circle>
    <text x="40" y="25" font-size="14" font-family="monospace">
      <tspan fill="#9aa3b2">Foyer · </tspan><tspan fill="#c2cad6">quiet</tspan><tspan fill="#7e8796"> · 2 worth a look</tspan>
    </text>
  </g>

  <!-- Bottom info line -->
  <text x="80" y="294" fill="#7e8796" font-size="13" font-family="monospace">
    <tspan fill="#9aa3b2">never pings you</tspan>
    <tspan fill="#2e3540"> | </tspan>
    <tspan fill="#9aa3b2">local-first</tspan>
    <tspan fill="#2e3540"> | </tspan>
    <tspan fill="#9aa3b2">private</tspan>
    <tspan fill="#2e3540">  &#x2022;  </tspan>
    <tspan fill="#7e8796">Liminal HQ</tspan>
  </text>
</svg>
